buildscript {
    ext {
        room_version = '2.4.2'

        versions = [
                minSdk    : 21,
                compileSdk: 32,
                targetSdk : 32,
                compose   : '1.1.1'
        ]

        deps = [
                kotlin : [
                        coroutines: "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.5.2"
                ],
                android: [
                        compose: [
                                foundation: "androidx.compose.foundation:foundation:${versions.compose}",
                                navigation: "androidx.navigation:navigation-compose:2.4.1",
                                ui        : "androidx.compose.ui:ui:${versions.compose}",
                                material  : "androidx.compose.material:material:${versions.compose}",
                                uiPreview : "androidx.compose.ui:ui-tooling-preview:${versions.compose}",
                                activity  : "androidx.activity:activity-compose:1.4.0",
                                viewModel : "androidx.lifecycle:lifecycle-viewmodel-compose:2.4.1",
                        ],
                        tools  : [
                                desugar: "com.android.tools:desugar_jdk_libs:1.1.5",
                        ]
                ],
                dagger : [
                        runtime : "com.google.dagger:dagger:2.41",
                        compiler: "com.google.dagger:dagger-compiler:2.41"
                ],
                javax  : [
                        inject: "javax.inject:javax.inject:1"
                ],
                room   : [
                        runtime : "androidx.room:room-runtime:$room_version",
                        compiler: "androidx.room:room-compiler:$room_version",
                        ktx     : "androidx.room:room-ktx:$room_version",
                ],
                timber : "com.jakewharton.timber:timber:5.0.1",
                coil   : "io.coil-kt:coil-compose:2.0.0-rc01",
        ]
    }
}

plugins {
    id 'com.android.application' version '7.1.1' apply false
    id 'com.android.library' version '7.1.1' apply false
    id 'org.jetbrains.kotlin.android' version '1.6.10' apply false
    id 'org.jetbrains.kotlin.jvm' version '1.6.10' apply false
}

task clean(type: Delete) {
    delete rootProject.buildDir
}