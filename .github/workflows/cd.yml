name: CD

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Set version from run number
        run: printf "versionCode=${{ github.run_number }}\nversionName=1.0.${{ github.run_number }}\n" > version.properties

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/zero-release.jks

      - name: Build release AAB
        env:
          KEYSTORE_FILE: /tmp/zero-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          FEEDBACK_ENDPOINT: ${{ vars.FEEDBACK_ENDPOINT }}
          FEEDBACK_INTEGRITY_PROJECT: ${{ vars.FEEDBACK_INTEGRITY_PROJECT }}
        run: ./gradlew bundleRelease

      - name: Install Play Store upload dependencies
        run: pip install google-auth google-api-python-client

      - name: Upload to Play Store
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
          python3 .github/scripts/upload_to_play.py "$AAB_PATH" "com.hluhovskyi.zero"

      - name: Cleanup keystore
        if: always()
        run: rm -f /tmp/zero-release.jks
