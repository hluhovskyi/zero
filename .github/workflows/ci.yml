name: CI

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        name: Detect runtime changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -qvE '(\.md$|^(skills|docs|\.claude)/)'; then
            echo "runtime=true" >> "$GITHUB_OUTPUT"
            echo "Runtime files changed — running gradle."
          else
            echo "Only non-runtime files changed — skipping gradle."
          fi

      - if: steps.changes.outputs.runtime == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - if: steps.changes.outputs.runtime == 'true'
        uses: gradle/actions/setup-gradle@v3

      - if: steps.changes.outputs.runtime == 'true'
        name: Run spotless check
        run: ./gradlew spotlessCheck

      - if: steps.changes.outputs.runtime == 'true'
        name: Run unit tests
        run: ./gradlew test

      - if: steps.changes.outputs.runtime == 'true'
        name: Run lint
        # `lint`, not `lintDebug` — the pure-JVM modules (zero-api, zero-sync, zero-backup)
        # use the standalone lint plugin, which only registers a `lint` task.
        run: ./gradlew lint

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'

  # Docs-only PRs skip gradle in the main job, so agent-doc edits get their own cheap gate.
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        name: Detect agent-doc changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -qE '(^|/)AGENTS\.md$|^docs/agents/'; then
            echo "docs=true" >> "$GITHUB_OUTPUT"
            echo "Agent docs changed — running consistency checks."
          else
            echo "No agent-doc changes — skipping."
          fi

      - if: steps.changes.outputs.docs == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - if: steps.changes.outputs.docs == 'true'
        uses: gradle/actions/setup-gradle@v3

      - if: steps.changes.outputs.docs == 'true'
        name: Run docs consistency test
        run: ./gradlew :lint-rules:test --tests 'com.hluhovskyi.zero.lint.DocsConsistencyTest'
