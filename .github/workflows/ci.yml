name: CI

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      runtime: ${{ steps.detect.outputs.runtime }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: detect
        name: Detect runtime changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -qvE '(\.md$|^(skills|docs|\.claude)/)'; then
            echo "runtime=true" >> "$GITHUB_OUTPUT"
            echo "Runtime files changed — running gradle."
          else
            echo "Only non-runtime files changed — skipping gradle."
          fi

  test:
    needs: changes
    if: needs.changes.outputs.runtime == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Run spotless check
        run: ./gradlew spotlessCheck

      - name: Run unit tests
        run: ./gradlew testAll

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'

  lint:
    needs: changes
    if: needs.changes.outputs.runtime == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3

      - name: Run lint
        run: ./gradlew lintDebug

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: '**/build/reports/lint/'
