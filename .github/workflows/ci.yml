name: CI

on:
  pull_request:
    branches: [ master ]

concurrency:
  group: ci-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: changes
        name: Detect runtime changes
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -qvE '(\.md$|^(skills|docs|\.claude)/)'; then
            echo "runtime=true" >> "$GITHUB_OUTPUT"
            echo "Runtime files changed — running gradle."
          else
            echo "Only non-runtime files changed — skipping gradle."
          fi

      - if: steps.changes.outputs.runtime == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - if: steps.changes.outputs.runtime == 'true'
        uses: gradle/actions/setup-gradle@v3

      - if: steps.changes.outputs.runtime == 'true'
        name: Run spotless check
        run: ./gradlew spotlessCheck --profile

      - if: steps.changes.outputs.runtime == 'true'
        name: Run unit tests
        run: ./gradlew test --profile

      - if: steps.changes.outputs.runtime == 'true'
        name: Run lint
        run: ./gradlew lintDebug --profile

      - if: always() && steps.changes.outputs.runtime == 'true'
        name: Upload gradle profile reports
        uses: actions/upload-artifact@v4
        with:
          name: gradle-profile-${{ github.run_id }}-${{ github.run_attempt }}
          path: '**/build/reports/profile/**'
          if-no-files-found: warn

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/tests/'
